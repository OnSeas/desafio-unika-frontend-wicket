<!DOCTYPE html>
<html lang="pt" xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8">
    <title>Pesquisar Monitoradores</title>
</head>
<body>
    <wicket:extend>

        <h2 class="d-flex justify-content-center" wicket:id="pesquisarTitulo" ></h2>

        <div>
            <form wicket:id="pesquisarForm" name="Form Pesquisar">
                <div class="d-grid gap-3 col-3 mx-auto">
                    <div class="d-flex">
                        <input type="text" class="form-control" wicket:id="inputPesquisa" placeholder="pesquisa">
                        <select wicket:id="inputTipo"></select>
                        <a wicket:id="botaoPesquisar" class="btn btn-success">Pesquisar</a>
                    </div>
                </div>
            </form>

            <div wicket:id="divResultados">
                <table class="table table-striped table-hover">
                    <tr>
                        <th>#</th>
                        <th>Tipo pessoa</th>
                        <th>Email</th>
                        <th>Data de Nascimento</th>
                    </tr>
                    <tr wicket:id="monitoradores">
                        <td wicket:id="index">[Count]</td>
                        <td wicket:id="tipoPessoa">[tipo pessoa]</td>
                        <td wicket:id="email">[email]</td>
                        <td wicket:id="dataNascimento">[data nascimento]</td>
                    </tr>
                </table>
            </div>
        </div>

    </wicket:extend>
</body>
</html>
