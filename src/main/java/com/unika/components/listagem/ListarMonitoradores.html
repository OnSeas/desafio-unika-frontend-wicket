<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt">
    <head>
        <meta charset="UTF-8">
        <title>Lista de monitoradores</title>
    </head>

    <body>
        <wicket:extend>
            <div>
                <h2 class="d-flex justify-content-center" wicket:id="ListarMonitorador">Teste!</h2>

                <div>
                    <table class="table table-striped table-hover">
                        <tr>
                            <th>#</th>
                            <th>Tipo pessoa</th>
                            <th>Email</th>
                            <th>Data de Nascimento</th>
                            <th>Opções</th>
                        </tr>
                        <tr wicket:id="Monitoradores">
                            <td wicket:id="id">[Count]</td>
                            <td wicket:id="tipoPessoa">[tipo pessoa]</td>
                            <td wicket:id="email">[email]</td>
                            <td wicket:id="dataNascimento">[cpf]</td>
                            <td>
                                <div class="d-grid gap-2 d-md-block">
                                    <button class="btn btn-secondary" type="button">Editar</button>
                                    <button class="btn btn-danger" type="button">Excluir</button>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </wicket:extend>
    </body>
</html>
