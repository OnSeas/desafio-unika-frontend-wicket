<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="pt">
    <head>
        <meta charset="UTF-8">
        <title>Lista de monitoradores</title>
    </head>

    <body>
        <wicket:extend>
            <div>

                <h2 class="d-flex justify-content-center" wicket:id="ListarMonitorador">Teste!</h2>

                <div wicket:id="Alerta"></div>

                <div>
                    <table class="table table-striped table-hover">
                        <tr>
                            <th>#</th>
                            <th>Tipo pessoa</th>
                            <th>Email</th>
                            <th>Data de Nascimento</th>
                            <th>Opções</th>
                        </tr>
                        <tr wicket:id="monitoradores">
                            <td wicket:id="index">[Count]</td>
                            <td wicket:id="tipoPessoa">[tipo pessoa]</td>
                            <td wicket:id="email">[email]</td>
                            <td wicket:id="dataNascimento">[data nascimento]</td>
                            <td>
                                <div class="btn-group" role="group" aria-label="Basic mixed styles example">
                                    <button wicket:id="botaoEditar" class="btn btn-secondary" type="button">Editar</button>
                                    <button wicket:id="botaoExcluir" class="btn btn-danger" type="button">Excluir</button>
                                    <button wicket:id="botaoDesativar" class="btn btn-secondary" type="button">Desativar</button>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

            </div>
        </wicket:extend>
    </body>
</html>
